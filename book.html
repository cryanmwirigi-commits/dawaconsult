<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pick a time for your DawaConsult pharmacy consultation.">
<title>Book Your Consultation | DawaConsult</title>

<!-- Same favicon as the rest of the site -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230B1F3A'/%3E%3Cstop offset='100%25' stop-color='%230E7C7B'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='70,4 127,37 127,103 70,136 13,103 13,37' fill='url(%23g)'/%3E%3Crect x='61' y='42' width='18' height='56' rx='4' fill='%232ECC71'/%3E%3Crect x='42' y='61' width='56' height='18' rx='4' fill='%232ECC71'/%3E%3Ccircle cx='70' cy='70' r='7' fill='%230B1F3A'/%3E%3C/svg%3E">

<!-- Same fonts as the rest of the site -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Your existing stylesheet -->
<link rel="stylesheet" href="styles.css">

<!-- Calendly embed assets -->
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js"></script>

<style>
  .pay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 5vw; border-bottom: 1px solid rgba(11,31,58,0.08);
    background: var(--white, #FDFCFA);
  }
  .pay-header .nav-logo { display: flex; align-items: center; gap: 0.6rem; }
  .pay-back { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--navy, #0B1F3A); text-decoration: none; opacity: 0.7; }
  .pay-back:hover { opacity: 1; }

  .book-wrap { max-width: 900px; margin: 0 auto; padding: 2.5rem 5vw 4rem; }
  .book-intro { text-align: center; margin-bottom: 2rem; }
  .book-intro .section-title, .book-intro .section-sub { margin-left: auto; margin-right: auto; }

  /* The little banner that appears when a booking is detected */
  .book-confirm {
    display: none; text-align: center; max-width: 520px; margin: 0 auto 1.5rem;
    background: var(--cream, #F5F0E8); border-radius: 12px; padding: 1rem 1.25rem;
    font-family: 'DM Sans', sans-serif; color: var(--navy, #0B1F3A);
  }
  .book-confirm.show { display: block; }

  #calendly-embed { min-width: 320px; height: 720px; }
</style>
</head>
<body>

<header class="pay-header">
  <a href="index.html" class="nav-logo" style="text-decoration:none;">
    <svg width="30" height="30" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="navHex" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0B1F3A"/>
          <stop offset="100%" stop-color="#0E7C7B"/>
        </linearGradient>
      </defs>
      <polygon points="70,4 127,37 127,103 70,136 13,103 13,37" fill="url(#navHex)"/>
      <rect x="61" y="42" width="18" height="56" rx="4" fill="#2ECC71"/>
      <rect x="42" y="61" width="56" height="18" rx="4" fill="#2ECC71"/>
      <circle cx="70" cy="70" r="7" fill="#0B1F3A"/>
    </svg>
    <span style="font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;font-family:'Cormorant Garamond',serif;color:var(--navy,#0B1F3A);">Dawa<span style="color:var(--teal,#0E7C7B);font-weight:300;">Consult</span></span>
  </a>
  <a class="pay-back" href="index.html">&larr; Back to site</a>
</header>

<main class="book-wrap">
  <div class="book-intro">
    <div class="section-label">Step 2 of 3 &middot; Pick a time</div>
    <h2 class="section-title">Choose your <em>appointment</em></h2>
    <p class="section-sub">Select a slot that works for you. Right after you book, you'll be taken to payment to confirm your consultation.</p>
  </div>

  <div class="book-confirm" id="book-confirm">
    Booked! Taking you to payment&hellip;
  </div>

  <!-- Calendly scheduler renders inside here -->
  <div id="calendly-embed"></div>
</main>

<script>
  // ─────────────────────────────────────────────────────────────
  //  book.html — embedded Calendly + hand-off to pay.html
  //  Calendly lives INSIDE this page, so when the booking finishes
  //  we catch the signal and send the visitor to pay ourselves.
  //  (No paid Calendly plan needed.)
  // ─────────────────────────────────────────────────────────────

  const CALENDLY_URL = 'https://calendly.com/dawaconsult/full-consultation';

  // Read what the form passed along (all optional).
  const params = new URLSearchParams(window.location.search);
  const tier  = params.get('tier')  || '';   // quick / full / ongoing
  const email = params.get('email') || '';
  const name  = params.get('name')  || '';

  // Embed the Calendly scheduler, pre-filled with their name/email if we have them.
  Calendly.initInlineWidget({
    url: CALENDLY_URL,
    parentElement: document.getElementById('calendly-embed'),
    prefill: { name: name, email: email },
  });

  // Listen for Calendly's messages. When a booking completes, hand off to pay.
  function isCalendlyEvent(e) {
    return e.data && e.origin === 'https://calendly.com'
      && typeof e.data.event === 'string'
      && e.data.event.indexOf('calendly.') === 0;
  }

  window.addEventListener('message', function (e) {
    if (isCalendlyEvent(e) && e.data.event === 'calendly.event_scheduled') {
      // Show a brief confirmation, then forward to payment carrying the package + email.
      document.getElementById('book-confirm').classList.add('show');

      const next = new URLSearchParams();
      if (tier)  next.set('tier', tier);
      if (email) next.set('email', email);

      setTimeout(function () {
        window.location.href = 'pay.html' + (next.toString() ? '?' + next.toString() : '');
      }, 1200);
    }
  });
</script>
</body>
</html>
